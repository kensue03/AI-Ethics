<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI 데이터 보안관: 비밀 임무</title>
    <style>
        /* 기존 스타일 유지 및 추가 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

        :root {
            --bg-blue: #F0F8FF;
            --main-blue: #4a90e2;
            --point-yellow: #f1c40f;
            --text-dark: #2c3e50;
            --text-gray: #7f8c8d;
            --success-green: #2ecc71;
            --fail-red: #e74c3c;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: var(--bg-blue);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; box-sizing: border-box;
        }

        #game-view-container {
            background-color: white;
            width: 100%; max-width: 380px; height: 100%; max-height: 680px;
            border-radius: 30px; box-shadow: var(--card-shadow);
            overflow: hidden; display: flex; flex-direction: column; position: relative;
        }

        #header { padding: 20px; text-align: center; flex-shrink: 0; }
        .mission-tag { display: inline-flex; align-items: center; gap: 5px; background: white; padding: 5px 12px; border-radius: 20px; border: 2px solid var(--point-yellow); font-size: 0.8rem; font-weight: 700; margin-bottom: 10px; }
        h1 { font-size: 1.6rem; margin: 0; font-weight: 800; }
        .subtitle { font-size: 0.9rem; color: var(--text-gray); margin-top: 5px; }

        #content-section { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #action-section { padding: 20px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }

        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 16px; background: var(--main-blue); color: white; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3); }
        .btn-action:active { transform: translateY(2px); }

        /* 입력 폼 스타일 */
        .input-group { width: 100%; margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-weight: 700; margin-bottom: 5px; color: var(--text-dark); }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }

        /* 결과 테이블 스타일 */
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .result-table th, .result-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .result-table th { background: var(--bg-blue); color: var(--text-dark); }
        .res-ok { color: var(--success-green); font-weight: 800; }
        .res-no { color: var(--fail-red); font-weight: 800; }

        /* 오버레이 */
        #incorrect-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="game-view-container">
        <div id="header">
            <div class="mission-tag"><span>✨</span> 개인정보 탈출 미션</div>
            <h1 id="main-title">AI 데이터 보안관</h1>
            <p class="subtitle">소중한 정보를 지키는 비밀 임무!</p>
        </div>

        <div id="content-section">
            <div id="setup-form" style="width: 100%;">
                <div class="input-group">
                    <label>학년/반/번호</label>
                    <input type="text" id="user-class" placeholder="예: 5-1-15">
                </div>
                <div class="input-group">
                    <label>이름</label>
                    <input type="text" id="user-name" placeholder="이름을 입력하세요">
                </div>
            </div>
            <div id="game-core" style="display: none; width: 100%; text-align: center;">
                <p id="question-text"></p>
            </div>
        </div>

        <div id="action-section">
            <button id="main-btn" class="btn-action" onclick="checkInfoAndStart()">임무 시작하기! ▷</button>
        </div>

        <div id="incorrect-overlay">
            <div style="font-size: 3rem; margin-bottom: 10px;">❌</div>
            <div id="incorrect-message"></div>
            <button class="btn-action" style="margin-top:20px; width: auto;" onclick="hideIncorrect()">다시 생각하기</button>
        </div>
    </div>

    <script>
        let userData = { class: "", name: "" };
        let currentStep = "";
        let missionResults = {}; // { qKey: { firstAttempt: true/false, question: "..." } }

        const gameSteps = {
            q1_1: { title: "1-1. 데이터 최소 수집", question: "축구 게임 AI를 만들 때 어떤 정보를 물어볼까요?", answers: [
                { text: "1. 좋아하는 선수 이름", correct: true, next: "q1_2" },
                { text: "2. 우리 집 주소", correct: false, msg: "게임에 집 주소는 필요 없어요!" }
            ]},
            q1_2: { title: "1-2. 보호자 동의", question: "어린이 정보를 모을 땐 누구의 허락이 필요할까요?", answers: [
                { text: "1. 옆집 형이나 누나", correct: false, msg: "보호자의 동의가 꼭 필요해요!" },
                { text: "2. 부모님이나 보호자", correct: true, next: "q2_1" }
            ]},
            q2_1: { title: "2-1. 안전한 보관", question: "모은 정보는 어디에 저장하는 것이 좋을까요?", answers: [
                { text: "1. 비밀번호 걸고 안전하게 보관", correct: true, next: "q2_2" },
                { text: "2. 학교 게시판에 붙이기", correct: false, msg: "누구나 보면 개인정보가 유출돼요!" }
            ]},
            q2_2: { title: "2-2. 가명 처리", question: "이름이 그대로 적혀 있다면 어떻게 할까요?", answers: [
                { text: "1. 별명으로 바꾸기(가명화)", correct: true, next: "q3_1" },
                { text: "2. 실명 그대로 두기", correct: false, msg: "누구인지 알 수 없게 해야 안전해요!" }
            ]},
            q3_1: { title: "3-1. 정보 파기", question: "사용이 끝난 개인정보는 어떻게 할까요?", answers: [
                { text: "1. 평생 보관하기", correct: false, msg: "필요 없어진 정보는 지워야 해요!" },
                { text: "2. 깨끗하게 지우기", correct: true, next: "q3_2" }
            ]},
            q3_2: { title: "3-2. 열람 및 삭제권", question: "친구가 자기 정보를 지워달라고 부탁하면?", answers: [
                { text: "1. 안 된다고 하기", correct: false, msg: "사용자는 자신의 정보를 지울 권리가 있어요!" },
                { text: "2. 확인하고 지워주기", correct: true, next: "finish" }
            ]}
        };

        function checkInfoAndStart() {
            const classVal = document.getElementById('user-class').value;
            const nameVal = document.getElementById('user-name').value;
            if(!classVal || !nameVal) return alert("학년/반/번호와 이름을 입력해주세요!");
            
            userData.class = classVal;
            userData.name = nameVal;
            
            document.getElementById('setup-form').style.display = 'none';
            document.getElementById('game-core').style.display = 'block';
            renderStep('q1_1');
        }

        function renderStep(stepKey) {
            currentStep = stepKey;
            const step = gameSteps[stepKey];
            if(!missionResults[stepKey]) {
                missionResults[stepKey] = { firstAttempt: true, title: step.title };
            }

            document.getElementById('question-text').innerText = step.question;
            const btnBox = document.getElementById('action-section');
            btnBox.innerHTML = '';

            step.answers.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.style.marginBottom = '10px';
                btn.innerText = ans.text;
                btn.onclick = () => {
                    if(ans.correct) {
                        if(ans.next === "finish") showFinalBridge();
                        else renderStep(ans.next);
                    } else {
                        missionResults[currentStep].firstAttempt = false;
                        showIncorrect(ans.msg);
                    }
                };
                btnBox.appendChild(btn);
            });
        }

        function showFinalBridge() {
            document.getElementById('question-text').innerHTML = `🎉 모든 임무 완료!<br><br><strong>${userData.name}</strong> 보안관님,<br>고생하셨습니다!`;
            const btnBox = document.getElementById('action-section');
            btnBox.innerHTML = `<button class="btn-action" onclick="showResults()">결과 확인하기 📊</button>`;
        }

        function showResults() {
            document.getElementById('main-title').innerText = "임무 결과 보고서";
            let resultHtml = `
                <div style="width:100%; text-align:left; font-size:0.9rem; margin-bottom:10px;">
                    <strong>정보:</strong> ${userData.class} ${userData.name}
                </div>
                <table class="result-table">
                    <thead><tr><th>문항</th><th>결과</th></tr></thead>
                    <tbody>`;
            
            for(let key in gameSteps) {
                const res = missionResults[key];
                resultHtml += `<tr>
                    <td>${res.title}</td>
                    <td class="${res.firstAttempt ? 'res-ok' : 'res-no'}">${res.firstAttempt ? '성공(정답)' : '실패(오답)'}</td>
                </tr>`;
            }
            resultHtml += `</tbody></table>`;
            
            document.getElementById('content-section').innerHTML = resultHtml;
            document.getElementById('action-section').innerHTML = `<button class="btn-action" onclick="location.reload()">처음으로 돌아가기</button>`;
        }

        function showIncorrect(msg) {
            document.getElementById('incorrect-message').innerText = msg;
            document.getElementById('incorrect-overlay').style.display = 'flex';
        }

        function hideIncorrect() {
            document.getElementById('incorrect-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
