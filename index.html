<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI 데이터 보안관: 비밀 임무</title>
    <style>
        /* 참고: 전체적인 모바일 UI 룩앤필 적용 */
        
        /* 웹 폰트 적용 (나눔고딕) */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');

        :root {
            /* 참고: 주요 포인트 색상 정의 */
            --bg-blue: #F0F8FF;
            --main-blue: #4a90e2; /*의 파란색 (버튼, 진행바) */
            --point-yellow: #f1c40f; /*의 노란색 (미션태그, 쉴드테두리) */
            --text-dark: #2c3e50;
            --text-gray: #7f8c8d;
            --success-green: #2ecc71;
            
            /* 카드 스타일 */
            --card-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Nanum Gothic', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-blue);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 모바일 터치 하이라이트 제거 */
        }

        /* 참고: 메인 콘텐츠를 감싸는 모바일 규격의 중앙 카드 */
        #game-view-container {
            background-color: white;
            width: 100%;
            max-width: 380px; /* 모바일 화면 폭 규격 */
            height: 100%;
            max-height: 680px; /* 모바일 화면 높이 규격 */
            border-radius: 30px; /*처럼 둥근 모서리 */
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- 상단: 헤더 및 미션 정보 --- */
        #header {
            padding: 20px 20px 10px;
            text-align: center;
            flex-shrink: 0;
        }

        /* 참고: 상단의 노란색 쉴드와 미션 태그 스타일 */
        .mission-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background-color: white;
            padding: 5px 12px;
            border-radius: 20px;
            border: 2px solid var(--point-yellow); /* 노란색 테두리 */
            color: var(--text-dark);
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .mission-icon {
            color: var(--point-yellow);
        }

        h1 {
            font-size: 1.6rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin: 5px 0 0;
            font-weight: 400;
        }

        /* --- [image_0.png] 참고: 게임 상태 및 진행 상황 표현 --- */
        #progress-section {
            padding: 10px 20px;
            flex-shrink: 0;
        }

        #status-bar {
            background-color: var(--bg-blue);
            color: var(--main-blue);
            padding: 10px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 10px;
        }

        /* [image_0.png]에는 없지만 게임 진행을 돕기 위해 추가한 진행 바(Step Bar) */
        #step-bar {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }

        .step-pill {
            flex: 1;
            height: 6px;
            background-color: #ddd;
            border-radius: 3px;
            transition: background-color 0.3s ease;
        }

        .step-pill.active {
            background-color: var(--main-blue);
        }

        /* --- 중단: 메인 콘텐츠 (질문, 이미지) --- */
        #content-section {
            flex: 1;
            padding: 20px;
            overflow-y: auto; /* 내용이 많을 때 스크롤 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 참고: 중앙의 큰 쉴드 아이콘 스타일 */
        .shield-image-area {
            position: relative;
            margin-bottom: 25px;
        }

        .main-shield-icon {
            font-size: 8rem;
            color: var(--main-blue);
        }

        .star-point {
            position: absolute;
            top: 0;
            right: 0;
            width: 30px;
            height: 30px;
            background-color: var(--point-yellow);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #question-text {
            font-size: 1.15rem;
            color: var(--text-dark);
            text-align: center;
            line-height: 1.6;
            white-space: pre-wrap; /* 줄바꿈 적용 */
            font-weight: 700;
        }

        /* --- 하단: 답변 버튼 및 시작 버튼 --- */
        #action-section {
            padding: 10px 20px 25px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /*의 '게임 시작하기' 버튼 스타일을 게임 진행 버튼에도 적용 */
        .btn-action {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 18px 20px;
            border: none;
            border-radius: 16px; /*처럼 둥근 버튼 */
            background-color: var(--main-blue); /*의 파란색 */
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
            text-decoration: none; /* A 태그일 때 대비 */
        }

        .btn-action:hover {
            background-color: #357abd;
        }

        .btn-action:active {
            transform: translateY(2px); /* 클릭 효과 */
        }

        /* 틀린 답변 알림 오버레이 */
        #incorrect-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            color: #ffcccc;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 30px;
            z-index: 10;
        }

        .incorrect-icon {
            font-size: 4rem;
            color: #e74c3c;
            margin-bottom: 20px;
        }
        
        #incorrect-message {
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.5;
        }

        /* 탈출 성공 화면용 스타일 */
        .success-area {
            text-align: center;
        }
        .success-icon {
            font-size: 5rem;
            color: var(--success-green);
            margin-bottom: 15px;
        }
        .success-title {
            color: var(--text-dark);
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="game-view-container">
        
        <div id="header">
            <div class="mission-tag">
                <span class="mission-icon">✨</span> 개인정보 탈출 미션
            </div>
            <h1>AI 데이터 보안관</h1>
            <p class="subtitle">소중한 정보를 지키는 비밀 임무!</p>
        </div>

        <div id="progress-section">
            <div id="status-bar">임무 브리핑</div>
            <div id="step-bar">
                <div class="step-pill active" data-step="1"></div>
                <div class="step-pill" data-step="2"></div>
                <div class="step-pill" data-step="3"></div>
                <div class="step-pill" data-step="end"></div>
            </div>
        </div>

        <div id="content-section">
            <div class="shield-image-area">
                <span class="main-shield-icon">🛡️</span>
                <span class="star-point">⭐</span>
            </div>
            
            <div id="question-text">데이터 비밀 본부에 오신 것을 환영합니다!<br>문제를 풀고 탈출하세요.</div>
        </div>

        <div id="action-section">
            <button class="btn-action" onclick="startGame()">임무 시작하기! ▷</button>
        </div>

        <div id="incorrect-overlay">
            <div class="incorrect-icon">❌</div>
            <div id="incorrect-message"></div>
            <button class="btn-action" style="margin-top:20px; width: auto;" onclick="hideIncorrect()">다시 생각해보기</button>
        </div>
    </div>

    <script>
        // 게임의 각 단계를 정의한 데이터
        const gameSteps = {
            start: {
                status: "임무 브리핑",
                progressIndex: 0,
                isCorrectMode: false,
                question: "데이터 비밀 본부에 오신 것을 환영합니다!\nAI 윤리 퀴즈를 모두 맞춰야 탈출할 수 있습니다.\n준비되었나요?",
                answers: [
                    { text: "임무 시작하기! ▷", nextStep: "q1_1" }
                ]
            },
            // --- 1단계: 수집 ---
            q1_1: {
                status: "데이터 수집의 방 (1)",
                progressIndex: 1,
                isCorrectMode: true,
                question: "(1-1) 축구 게임 AI를 만들려고 해요.\n사용자에게 어떤 정보를 물어볼까요?",
                answers: [
                    { text: "1. 좋아하는 선수 이름", correct: true, nextStep: "q1_2" },
                    { text: "2. 우리 집 주소", correct: false, msg: "❌ 삐빅! 게임에 필요 없는 개인정보예요." }
                ]
            },
            q1_2: {
                status: "데이터 수집의 방 (2)",
                progressIndex: 1,
                isCorrectMode: true,
                question: "(1-2) 어린 친구들의 정보를 모으고 싶을 땐\n누구에게 허락을 받아야 할까요?",
                answers: [
                    { text: "1. 옆집 형이나 누나", correct: false, msg: "❌ 틀렸어요! 아동의 정보는 보호자가 중요해요." },
                    { text: "2. 부모님이나 보호자", correct: true, nextStep: "q2_1" }
                ]
            },
            // --- 2단계: 관리 ---
            q2_1: {
                status: "데이터 보관의 방 (1)",
                progressIndex: 2,
                isCorrectMode: true,
                question: "(2-1) 모은 소중한 정보들을\n어디에 저장하는 것이 좋을까요?",
                answers: [
                    { text: "1. 비밀번호 걸고 안전하게 보관", correct: true, nextStep: "q2_2" },
                    { text: "2. 학교 게시판에 붙여두기", correct: false, msg: "❌ 위험해요! 나쁜 사람들이 정보를 훔칠 수 있어요." }
                ]
            },
            q2_2: {
                status: "데이터 보관의 방 (2)",
                progressIndex: 2,
                isCorrectMode: true,
                question: "(2-2) 정보 속에 '홍길동'이라는 이름이\n그대로 적혀 있어요. 어떻게 할까요?",
                answers: [
                    { text: "1. '사용자A'처럼 별명으로 바꾼다.", correct: true, nextStep: "q3_1" },
                    { text: "2. 실명을 그대로 둔다.", correct: false, msg: "❌ 실명이 노출되면 그 친구 사생활이 위험해요!" }
                ]
            },
            // --- 3단계: 파기 ---
            q3_1: {
                status: "데이터 파기의 방 (1)",
                progressIndex: 3,
                isCorrectMode: true,
                question: "(3-1) AI를 다 만들어서 이제 필요없어진\n개인정보는 어떻게 할까요?",
                answers: [
                    { text: "1. 평생 보관하기", correct: false, msg: "❌ 삐빅! 오래된 정보를 가지고 있으면 위험해요." },
                    { text: "2. 깨끗하게 지우기", correct: true, nextStep: "q3_2" }
                ]
            },
            q3_2: {
                status: "데이터 파기의 방 (2)",
                progressIndex: 3,
                isCorrectMode: true,
                question: "(3-2) 한 친구가 '내 정보를 보여주고 지워줘!'\n라고 부탁하면 어떻게 할까요?",
                answers: [
                    { text: "1. 안 된다고 하기", correct: false, msg: "❌ 친구의 부탁을 거절하면 정직한 보안관이 아니에요." },
                    { text: "2. 보여주고 지워주기", correct: true, nextStep: "end" }
                ]
            },
            // --- 탈출 성공 ---
            end: {
                status: "임무 완료",
                progressIndex: 4,
                isCorrectMode: false,
                question: "🎉 축하합니다!\n모든 문제를 해결하고 탈출에 성공하셨습니다!\n당신은 멋진 데이터 보안관입니다.",
                answers: [
                    { text: "다시 하기", nextStep: "q1_1" }
                ]
            }
        };

        // 화면을 업데이트하는 함수
        function renderStep(stepKey) {
            const step = gameSteps[stepKey];
            
            // 상태바, 질문 텍스트 업데이트
            document.getElementById('status-bar').innerText = step.status;
            document.getElementById('question-text').innerText = step.question;
            
            // 진행 바 업데이트
            updateProgressBar(step.progressIndex);

            // 버튼 영역 초기화
            const buttonContainer = document.getElementById('action-section');
            buttonContainer.innerHTML = '';
            
            // 탈출 성공 화면 UI로 변경
            if (stepKey === 'end') {
                const contentSection = document.getElementById('content-section');
                contentSection.innerHTML = `
                    <div class="success-area">
                        <div class="success-icon">🎉</div>
                        <div class="success-title">임무 완료!</div>
                        <p id="question-text">모든 문제를 해결하고<br>탈출에 성공하셨습니다!<br>당신은 멋진 데이터 보안관입니다.</p>
                    </div>
                `;
            }

            // 새로운 버튼들 생성
            step.answers.forEach(answer => {
                const button = document.createElement('button');
                button.className = 'btn-action';
                button.innerText = answer.text;
                
                // 버튼 클릭 시 이벤트 처리
                button.onclick = () => {
                    if (!step.isCorrectMode || answer.correct) {
                        // 정답이거나 시작/끝 화면이면 다음 단계로 이동
                        renderStep(answer.nextStep);
                    } else {
                        // 틀렸을 때 알림 표시
                        showIncorrect(answer.msg);
                    }
                };
                
                buttonContainer.appendChild(button);
            });
        }

        // 진행 바 업데이트 함수
        function updateProgressBar(index) {
            const pills = document.querySelectorAll('.step-pill');
            pills.forEach((pill, idx) => {
                if (idx < index) {
                    pill.classList.add('active');
                } else {
                    pill.classList.remove('active');
                }
            });
        }

        // 틀린 답변 표시 함수
        function showIncorrect(msg) {
            document.getElementById('incorrect-message').innerText = msg;
            document.getElementById('incorrect-overlay').style.display = 'flex';
        }

        // 틀린 답변 가리기 함수
        function hideIncorrect() {
            document.getElementById('incorrect-overlay').style.display = 'none';
        }

        // 게임 시작 함수
        function startGame() {
            // 메인 콘텐츠 영역 초기화 (성공 화면에서 다시 시작할 때 대비)
            const contentSection = document.getElementById('content-section');
            contentSection.innerHTML = `
                <div class="shield-image-area">
                    <span class="main-shield-icon">🛡️</span>
                    <span class="star-point">⭐</span>
                </div>
                <div id="question-text">데이터 비밀 본부에 오신 것을 환영합니다!<br>문제를 풀고 탈출하세요.</div>
            `;
            renderStep('q1_1');
        }
    </script>
</body>
</html>
